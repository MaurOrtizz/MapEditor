services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    environment:
      - ALLOWED_ORIGINS=http://localhost:5173
      - DATABASE_URL=sqlite:///mapeditor.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./map-editor
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./map-editor:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend